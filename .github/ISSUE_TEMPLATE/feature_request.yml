name: Feature request or idea
description: Suggest a capability, a workflow, or an improvement
title: "[idea]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Ideas are welcome. The most useful ones describe a real workflow, not
        just a solution.
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that Synapse makes hard today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What you would like
      description: Your proposed solution or the behavior you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
  - type: checkboxes
    id: checks
    attributes:
      label: Before you file
      options:
        - label: I searched existing issues and did not find a duplicate
          required: true
